<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">

  <title>Louis Schiekiera — Computational Cognitive Scientist</title>
  <meta name="description" content="Louis Schiekiera — cognitive and machine-learning scientist at HU Berlin and FU Berlin. Machine psychology, LLM interpretability, computational cognitive modeling.">

  <!-- Open Graph -->
  <meta property="og:title" content="Louis Schiekiera — Computational Cognitive Scientist">
  <meta property="og:description" content="Computational cognitive modeling, Machine Psychology, Metascience.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://schiekiera.github.io/intro/">
  <meta property="og:image" content="https://schiekiera.github.io/assets/img/ls.jpg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css?v=9">
  <link rel="stylesheet" href="animations.css?v=9">

  <!-- Favicon (boar emoji, matches site) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%97%3C/text%3E%3C/svg%3E">
</head>
<body>

  <!-- Reading-progress bar -->
  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

  <!-- Sections -->
  <section id="hero" class="section section--hero"></section>
  <section id="about" class="section"></section>
  <section id="research" class="section"></section>
  <section id="highlights" class="section"></section>
  <section id="selected-work" class="section"></section>
  <section id="blog" class="section"></section>

  <!-- Footer -->
  <footer class="intro-footer" id="footer"></footer>

  <!-- Data -->
  <script src="content.js?v=5"></script>

  <!-- Rendering -->
  <script>
    /* ---- Renderers ---- */

    function renderHero() {
      const d = defined.hero;
      document.getElementById('hero').innerHTML = `
        <div class="container hero__container">
          <h1 class="hero__name">${d.name}</h1>
          <p class="hero__subtitle">${d.subtitle}</p>
          <p class="hero__tagline">${d.tagline}</p>
          <div class="hero__logos">
            ${d.affiliations.map(a => a.url
              ? `<a class="hero__logo" href="${a.url}" target="_blank" rel="noopener">${a.abbr}</a>`
              : `<span class="hero__logo">${a.abbr}</span>`).join('')}
          </div>
          <a class="hero__website" href="${d.siteUrl}" target="_blank" rel="noopener">${d.siteLabel} &rarr;</a>
          <div class="hero__scroll-hint" aria-hidden="true"><i class="fa-solid fa-chevron-down"></i></div>
        </div>`;
    }

    function renderAbout() {
      const d = defined.about;
      document.getElementById('about').innerHTML = `
        <div class="container">
          <div class="kicker animate-on-scroll">About</div>
          <div class="about__layout">
            <div class="about__text">
              <p class="about__bio animate-on-scroll">${d.bio}</p>
              <ul class="role-list">
                ${d.roles.map(r => `
                  <li class="role-list__item animate-on-scroll">
                    <div class="role-list__title">${r.title}</div>
                    <div class="role-list__org">${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.org}</a>` : r.org}</div>
                  </li>`).join('')}
              </ul>
            </div>
            <div class="about__photo-wrap animate-on-scroll">
              <img class="about__photo" src="${d.photo}" alt="${d.photoAlt}">
            </div>
          </div>
          <div class="about__background">
            <div>
              <h3 class="about__bg-title">Education</h3>
              <ul class="about__bg-list">
                ${d.education.map(e => `
                  <li class="about__bg-item animate-on-scroll">
                    <div class="about__bg-degree">${e.degree}</div>
                    <div class="about__bg-inst">${e.inst} · ${e.year}</div>
                    ${e.detail ? `<div class="about__bg-detail">${e.detail}</div>` : ''}
                  </li>`).join('')}
              </ul>
            </div>
            <div>
              <h3 class="about__bg-title">Experience</h3>
              <ul class="about__bg-list">
                ${d.experience.map(e => `
                  <li class="about__bg-item animate-on-scroll">
                    <div class="about__bg-degree">${e.role}</div>
                    <div class="about__bg-inst">${e.inst} · ${e.year}</div>
                    ${e.detail ? `<div class="about__bg-detail">${e.detail}</div>` : ''}
                  </li>`).join('')}
              </ul>
            </div>
          </div>
        </div>`;
    }

    function renderResearch() {
      const d = defined.research;
      document.getElementById('research').innerHTML = `
        <div class="container">
          <div class="kicker animate-on-scroll">Research</div>
          <p class="section__tldr animate-on-scroll">${d.tldr}</p>
          <div class="research-grid">
            ${d.cards.map(r => `
              <div class="research-card animate-on-scroll">
                <div class="research-card__icon"><i class="${r.icon}"></i></div>
                <div class="research-card__name">${r.name}</div>
                <div class="research-card__desc">${r.desc}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    function renderHighlights() {
      const d = defined.highlights;
      const section = document.getElementById('highlights');
      if (!d || !section) { if (section) section.remove(); return; }
      section.innerHTML = `
        <div class="container">
          <div class="kicker animate-on-scroll">Highlights</div>
          <ul class="highlights-list">
            ${d.map(h => `
              <li class="highlight-item animate-on-scroll">
                <div class="highlight-item__text">${h.text}</div>
                <div class="highlight-item__detail">${h.detail}</div>
              </li>`).join('')}
          </ul>
        </div>`;
    }

    function renderSelectedWork() {
      const d = defined.selectedWork;
      document.getElementById('selected-work').innerHTML = `
        <div class="container">
          <div class="kicker animate-on-scroll">Selected projects</div>
          <p class="section__tldr animate-on-scroll">${d.tldr} <a href="${d.allUrl}" class="section__tldr-link">View all &rarr;</a></p>
          <div class="work-list">
            ${d.items.map((p, i) => `
              <article class="work-row work-row--${i % 2 === 0 ? 'img-left' : 'img-right'} animate-on-scroll">
                <div class="work-row__img-wrap">
                  ${p.preview
                    ? `<img class="work-row__img" src="${p.preview}" alt="${p.title}">`
                    : `<div class="work-row__img work-row__img--placeholder"><i class="${p.placeholderIcon || 'fa-solid fa-flask'}"></i></div>`}
                </div>
                <div class="work-row__body">
                  <div class="work-row__tag">${p.tag}</div>
                  <h3 class="work-row__title">${p.title}</h3>
                  <div class="work-row__venue">${p.venue}</div>
                  <p class="work-row__desc">${p.desc}</p>
                  <div class="work-row__links">
                    ${(p.links || []).map(l => `<a class="work-btn" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join('')}
                  </div>
                </div>
              </article>`).join('')}
          </div>
        </div>`;
    }

    function renderBlog() {
      const d = defined.blog;
      const section = document.getElementById('blog');
      if (!d || !section) { if (section) section.remove(); return; }
      section.innerHTML = `
        <div class="container">
          <div class="kicker animate-on-scroll">Blog</div>
          <p class="section__tldr animate-on-scroll">${d.tldr} <a href="${d.allUrl}" class="section__tldr-link">View all &rarr;</a></p>
          <div class="blog-grid">
            ${d.items.map(b => `
              <a class="blog-item animate-on-scroll" href="${b.url}" target="_blank" rel="noopener">
                <div class="blog-item__tag">${b.tag}</div>
                <div class="blog-item__title">${b.title}</div>
                <div class="blog-item__desc">${b.desc}</div>
                <div class="blog-item__date">${b.date}</div>
              </a>`).join('')}
          </div>
        </div>`;
    }

    function renderFooter() {
      const d = defined.footer;
      document.getElementById('footer').innerHTML = `
        <div class="intro-footer__inner">
          <div class="intro-footer__links">${d.links.map(l => `<a href="${l.url}">${l.label}</a>`).join('<span class="intro-footer__sep">·</span>')}</div>
          <div class="intro-footer__social">
            ${d.social.map(s => `<a href="${s.url}" target="_blank" rel="noopener" title="${s.label}" aria-label="${s.label}"><i class="${s.icon}"></i></a>`).join('')}
          </div>
          <div class="intro-footer__meta">${d.meta}</div>
        </div>`;
    }

    /* ---- Scroll Animations ---- */

    function initAnimations() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
    }

    /* ---- Reading-progress bar ---- */

    function initScrollProgress() {
      const bar = document.getElementById('scroll-progress');
      if (!bar) return;
      let ticking = false;
      const update = () => {
        const doc = document.documentElement;
        const max = doc.scrollHeight - doc.clientHeight;
        const p = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
        bar.style.transform = `scaleX(${p})`;
        ticking = false;
      };
      window.addEventListener('scroll', () => {
        if (!ticking) { requestAnimationFrame(update); ticking = true; }
      }, { passive: true });
      window.addEventListener('resize', update);
      update();
    }

    /* ---- Init ---- */

    document.addEventListener('DOMContentLoaded', () => {
      renderHero();
      renderAbout();
      renderResearch();
      renderHighlights();
      renderSelectedWork();
      renderBlog();
      renderFooter();
      initAnimations();
      initScrollProgress();
    });
  </script>

</body>
</html>
